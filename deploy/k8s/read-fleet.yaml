apiVersion: v1
kind: Service
metadata:
  name: shoal-read
  labels:
    app.kubernetes.io/name: shoal
    app.kubernetes.io/component: read-fleet
    app.kubernetes.io/part-of: shoal-platform
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: shoal
    app.kubernetes.io/component: read-fleet
  ports:
    - name: thrift
      port: 9800
      targetPort: thrift
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: shoal-read
  labels:
    app.kubernetes.io/name: shoal
    app.kubernetes.io/component: read-fleet
    app.kubernetes.io/part-of: shoal-platform
spec:
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: shoal
      app.kubernetes.io/component: read-fleet
  template:
    metadata:
      labels:
        app.kubernetes.io/name: shoal
        app.kubernetes.io/component: read-fleet
        app.kubernetes.io/part-of: shoal-platform
    spec:
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: shoal
                    app.kubernetes.io/component: read-fleet
                topologyKey: kubernetes.io/hostname
      containers:
        - name: shoal
          image: ghcr.io/example/shoal:dev
          imagePullPolicy: IfNotPresent
          command: ["/shoal"]
          args:
            - -listen=$(SHOAL_THRIFT_LISTEN)
            - -zk=$(SHOAL_ZK)
            - -instance=$(SHOAL_INSTANCE)
            - -accumulo-version=$(SHOAL_ACCUMULO_VERSION)
            - -user=$(SHOAL_METADATA_USER)
            - -storage=$(SHOAL_STORAGE_SCHEME)
            - -cache-bytes=$(SHOAL_CACHE_BYTES)
            - -log-level=$(SHOAL_LOG_LEVEL)
            - -prewarm-tables=$(SHOAL_PREWARM_TABLES)
            - -prewarm-parallelism=$(SHOAL_PREWARM_PARALLELISM)
          envFrom:
            - configMapRef:
                name: shoal-platform-config
          env:
            - name: SHOAL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: shoal-object-storage-credentials
                  key: accumulo-password
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: /var/run/secrets/shoal/gcs/key.json
          ports:
            - name: thrift
              containerPort: 9800
          volumeMounts:
            - name: object-storage-credentials
              mountPath: /var/run/secrets/shoal/gcs
              readOnly: true
          readinessProbe:
            tcpSocket:
              port: thrift
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: thrift
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: object-storage-credentials
          secret:
            secretName: shoal-object-storage-credentials
            optional: true
