apiVersion: v1
kind: Service
metadata:
  name: shoal-embed-headless
  labels:
    app.kubernetes.io/name: shoal-embed
    app.kubernetes.io/component: write-tier
    app.kubernetes.io/part-of: shoal-platform
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app.kubernetes.io/name: shoal-embed
    app.kubernetes.io/component: write-tier
  ports:
    - name: grpc
      port: 9876
      targetPort: grpc
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: shoal-embed
  labels:
    app.kubernetes.io/name: shoal-embed
    app.kubernetes.io/component: write-tier
    app.kubernetes.io/part-of: shoal-platform
spec:
  # Scale one StatefulSet per shard. Increase replicas only after the write
  # routing/ownership model for that shard is defined.
  replicas: 1
  serviceName: shoal-embed-headless
  selector:
    matchLabels:
      app.kubernetes.io/name: shoal-embed
      app.kubernetes.io/component: write-tier
  template:
    metadata:
      labels:
        app.kubernetes.io/name: shoal-embed
        app.kubernetes.io/component: write-tier
        app.kubernetes.io/part-of: shoal-platform
    spec:
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: shoal-embed
          image: ghcr.io/example/shoal:dev
          imagePullPolicy: IfNotPresent
          command: ["/shoal-embed"]
          args:
            - serve
            - --data=$(SHOAL_EMBED_DATA_DIR)
            - --port=$(SHOAL_EMBED_GRPC_PORT)
          envFrom:
            - configMapRef:
                name: shoal-platform-config
          ports:
            - name: grpc
              containerPort: 9876
          volumeMounts:
            - name: data
              mountPath: /var/lib/shoal
            - name: object-storage-credentials
              mountPath: /var/run/secrets/shoal/gcs
              readOnly: true
          # TODO(shoal): these TCP probes become externally useful after
          # cmd/shoal-embed listens on 0.0.0.0 instead of 127.0.0.1.
          readinessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: object-storage-credentials
          secret:
            secretName: shoal-object-storage-credentials
            optional: true
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 50Gi
