apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "shoal.fullname" . }}-embed
  labels:
    {{- include "shoal.labels" . | nindent 4 }}
    app.kubernetes.io/component: write-tier
spec:
  replicas: {{ .Values.writeTier.replicas }}
  serviceName: {{ include "shoal.fullname" . }}-embed-headless
  selector:
    matchLabels:
      app.kubernetes.io/name: shoal-embed
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: write-tier
  template:
    metadata:
      labels:
        app.kubernetes.io/name: shoal-embed
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: write-tier
        app.kubernetes.io/part-of: shoal-platform
    spec:
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: shoal-embed
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/shoal-embed"]
          args:
            - serve
            - --data=$(SHOAL_EMBED_DATA_DIR)
            - --port=$(SHOAL_EMBED_GRPC_PORT)
          envFrom:
            - configMapRef:
                name: {{ include "shoal.fullname" . }}-config
          ports:
            - name: grpc
              containerPort: {{ .Values.writeTier.grpcPort }}
          volumeMounts:
            - name: data
              mountPath: {{ .Values.writeTier.dataDir }}
            - name: object-storage-credentials
              mountPath: /var/run/secrets/shoal/gcs
              readOnly: true
          readinessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            {{- toYaml .Values.writeTier.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: object-storage-credentials
          secret:
            secretName: {{ .Values.objectStorage.credentialsSecretName }}
            optional: true
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.writeTier.storageSize }}
