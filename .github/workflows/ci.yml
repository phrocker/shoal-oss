name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-test:
    name: build / vet / test
    runs-on: ubuntu-latest
    env:
      # The repository's go.work overlays a private, local-only module
      # (wal-quorum-sidecar) that CI cannot fetch. Disable the workspace so the
      # build resolves against go.mod alone. The handful of packages that need
      # the sidecar (internal/qwal, internal/memtable, internal/scanserver and
      # the cmd/shoal server that wires them) are excluded from the package set
      # below; everything else — the RFile core, engine, tablet, iterators,
      # compaction, storage backends and the shoal-embed tool — builds cleanly.
      GOWORK: off
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so the formatting gate can diff against the base.
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Check formatting (changed Go files)
        run: |
          # Gate only the files this push/PR touches: new code must be
          # gofmt-clean without forcing a repo-wide reformat of pre-existing
          # files. CI runs on Linux (LF), so gofmt is accurate here.
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
          else
            base="${{ github.event.before }}"
          fi
          if [ -z "$base" ] || ! git cat-file -e "${base}^{commit}" 2>/dev/null; then
            echo "No usable base ref; skipping changed-file formatting check."
            exit 0
          fi
          files=$(git diff --name-only --diff-filter=ACM "$base" HEAD -- '*.go' \
            | grep -vE '^internal/thrift/gen/' || true)
          if [ -z "$files" ]; then
            echo "No Go files changed."
            exit 0
          fi
          unformatted=$(gofmt -l $files)
          if [ -n "$unformatted" ]; then
            echo "These changed files are not gofmt-clean (run: gofmt -w <file>):"
            echo "$unformatted"
            exit 1
          fi
          echo "Changed Go files are gofmt-clean."

      - name: Compute package set
        id: pkgs
        run: |
          # Exclude packages that depend on the private wal-quorum-sidecar.
          # Emit as a single space-separated line so it expands to arguments
          # (not separate commands) in the build/vet/test steps below.
          pkgs=$(go list -e ./... \
            | grep -vE '/internal/(qwal|memtable|scanserver)$' \
            | grep -vE '/cmd/shoal$' \
            | tr '\n' ' ')
          echo "Selected $(echo $pkgs | wc -w) packages"
          echo "list=$pkgs" >> "$GITHUB_OUTPUT"

      - name: Build
        run: go build ${{ steps.pkgs.outputs.list }}

      - name: Vet
        run: go vet ${{ steps.pkgs.outputs.list }}

      - name: Test (race)
        run: go test -race -count=1 ${{ steps.pkgs.outputs.list }}
